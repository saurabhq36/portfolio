<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <defs>
    <linearGradient id="lid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2f4a"/>
      <stop offset="100%" stop-color="#1a1e30"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d111f"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#252840"/>
      <stop offset="100%" stop-color="#1a1e30"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0BCEAF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0BCEAF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Lid -->
  <rect x="6" y="2" width="188" height="108" rx="10" fill="url(#lid)" stroke="#3a3f5a" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="14" y="10" width="172" height="92" rx="5" fill="url(#screen)"/>
  <rect x="14" y="10" width="172" height="92" rx="5" fill="url(#glow)"/>

  <!-- Code editor UI -->
  <!-- Top bar -->
  <rect x="14" y="10" width="172" height="14" rx="5" fill="#111520"/>
  <circle cx="24" cy="17" r="3.5" fill="#ff5f56"/>
  <circle cx="34" cy="17" r="3.5" fill="#ffbd2e"/>
  <circle cx="44" cy="17" r="3.5" fill="#27c93f"/>
  <rect x="68" y="13" width="64" height="8" rx="3" fill="#1e2336"/>

  <!-- Sidebar -->
  <rect x="14" y="24" width="28" height="78" fill="#0e1220"/>
  <rect x="19" y="30" width="18" height="3" rx="1.5" fill="#0BCEAF" opacity="0.5"/>
  <rect x="19" y="37" width="14" height="2.5" rx="1.25" fill="rgba(255,255,255,0.15)"/>
  <rect x="19" y="43" width="16" height="2.5" rx="1.25" fill="rgba(255,255,255,0.15)"/>
  <rect x="19" y="49" width="12" height="2.5" rx="1.25" fill="rgba(255,255,255,0.1)"/>
  <rect x="19" y="55" width="15" height="2.5" rx="1.25" fill="rgba(255,255,255,0.1)"/>

  <!-- Code lines -->
  <rect x="50" y="30" width="28" height="3" rx="1.5" fill="#c792ea" opacity="0.8"/>
  <rect x="80" y="30" width="18" height="3" rx="1.5" fill="#0BCEAF" opacity="0.9"/>
  <rect x="50" y="38" width="16" height="2.5" rx="1.25" fill="#82aaff" opacity="0.7"/>
  <rect x="68" y="38" width="42" height="2.5" rx="1.25" fill="#c3e88d" opacity="0.6"/>
  <rect x="50" y="46" width="12" height="2.5" rx="1.25" fill="#f78c6c" opacity="0.7"/>
  <rect x="64" y="46" width="56" height="2.5" rx="1.25" fill="rgba(255,255,255,0.18)"/>
  <rect x="50" y="54" width="36" height="2.5" rx="1.25" fill="#82aaff" opacity="0.5"/>
  <rect x="88" y="54" width="22" height="2.5" rx="1.25" fill="#0BCEAF" opacity="0.6"/>
  <rect x="50" y="62" width="48" height="2.5" rx="1.25" fill="rgba(255,255,255,0.15)"/>
  <rect x="50" y="70" width="30" height="2.5" rx="1.25" fill="#c3e88d" opacity="0.5"/>
  <rect x="82" y="70" width="18" height="2.5" rx="1.25" fill="rgba(255,255,255,0.12)"/>
  <rect x="50" y="78" width="40" height="2.5" rx="1.25" fill="#c792ea" opacity="0.5"/>
  <!-- cursor blink line -->
  <rect x="50" y="86" width="3" height="8" rx="1" fill="#0BCEAF" opacity="0.9"/>

  <!-- Notch -->
  <rect x="88" y="2" width="24" height="7" rx="3" fill="#0d111f"/>
  <circle cx="100" cy="5" r="2" fill="#1e2336"/>

  <!-- Base -->
  <rect x="2" y="110" width="196" height="18" rx="7" fill="url(#base)" stroke="#3a3f5a" stroke-width="1.5"/>
  <!-- Trackpad -->
  <rect x="74" y="114" width="52" height="10" rx="4" fill="#1e2336" stroke="#2e3450" stroke-width="1"/>
  <!-- Bottom shadow -->
  <rect x="0" y="128" width="200" height="8" rx="4" fill="#0a0d16"/>
</svg>
