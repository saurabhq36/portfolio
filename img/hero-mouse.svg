<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="pad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1220"/>
      <stop offset="100%" stop-color="#0a0d16"/>
    </linearGradient>
    <linearGradient id="mb" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#2a2f4a"/>
      <stop offset="100%" stop-color="#1a1e30"/>
    </linearGradient>
    <linearGradient id="ml" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e2336" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3a3f5a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e2336" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Mousepad shadow -->
  <ellipse cx="60" cy="142" rx="55" ry="14" fill="#060810" opacity="0.6"/>

  <!-- Mousepad -->
  <ellipse cx="60" cy="134" rx="54" ry="20" fill="url(#pad)" stroke="#1e2433" stroke-width="1.5"/>
  <!-- Pad surface sheen -->
  <ellipse cx="60" cy="130" rx="48" ry="14" fill="rgba(255,255,255,0.02)"/>
  <!-- Pad teal ring -->
  <ellipse cx="60" cy="134" rx="54" ry="20" fill="none" stroke="#0BCEAF" stroke-width="0.8" opacity="0.3"/>

  <!-- Mouse body -->
  <path d="M36,38 Q36,12 60,10 Q84,12 84,38 L86,112 Q86,128 60,130 Q34,128 34,112 Z" fill="url(#mb)" stroke="#3a3f5a" stroke-width="1.5"/>

  <!-- Body sheen highlight -->
  <path d="M44,36 Q44,16 60,14 Q72,16 72,36 L72,60 Q60,54 44,60 Z" fill="rgba(255,255,255,0.04)"/>

  <!-- Left / right button split line -->
  <line x1="60" y1="10" x2="60" y2="72" stroke="#3a3f5a" stroke-width="1" opacity="0.8"/>

  <!-- Left click button -->
  <path d="M36,38 Q36,12 60,10 L60,72 Q44,72 36,64 Z" fill="rgba(255,255,255,0.02)"/>

  <!-- Scroll wheel -->
  <rect x="54" y="28" width="12" height="24" rx="6" fill="#111520" stroke="#0BCEAF" stroke-width="1"/>
  <!-- Wheel grooves -->
  <rect x="54" y="33" width="12" height="2" rx="1" fill="#0BCEAF" opacity="0.45"/>
  <rect x="54" y="37" width="12" height="2" rx="1" fill="#0BCEAF" opacity="0.35"/>
  <rect x="54" y="41" width="12" height="2" rx="1" fill="#0BCEAF" opacity="0.25"/>

  <!-- Side button -->
  <rect x="34" y="70" width="4" height="14" rx="2" fill="#0BCEAF" opacity="0.5"/>

  <!-- Bottom USB-C port hint -->
  <rect x="54" y="124" width="12" height="4" rx="2" fill="#111520" stroke="#2e3450" stroke-width="0.5"/>

  <!-- Underglow -->
  <ellipse cx="60" cy="128" rx="20" ry="6" fill="#0BCEAF" opacity="0.2"/>
  <ellipse cx="60" cy="128" rx="12" ry="3.5" fill="#0BCEAF" opacity="0.3"/>

  <!-- Body reflection strip -->
  <path d="M38,50 Q38,38 60,35 Q60,35 60,50 Q48,48 38,50 Z" fill="url(#ml)" opacity="0.4"/>
</svg>
